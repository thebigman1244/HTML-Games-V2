<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HardMath | Games</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0b1020;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(99,102,241,.1), transparent 55%),
                        radial-gradient(circle at 70% 70%, rgba(14,165,233,.1), transparent 55%);
            pointer-events: none;
            z-index: 0;
        }
        .header {
            text-align: center;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #64748b; font-size: .9rem; }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(99,102,241,.15);
            border: 1px solid rgba(99,102,241,.3);
            color: #818cf8;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: .9rem;
            transition: all .2s;
        }
        .back-btn:hover { background: rgba(99,102,241,.25); }
        .search-bar {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            display: block;
            padding: 14px 20px;
            background: rgba(15,23,42,.85);
            border: 1px solid #334155;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            position: relative;
            z-index: 1;
        }
        .search-bar:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .game-card {
            background: rgba(15,23,42,.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(99,102,241,.2);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            transition: all .2s;
            cursor: pointer;
            text-decoration: none;
            color: #e2e8f0;
            display: block;
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99,102,241,.5);
            box-shadow: 0 8px 25px rgba(0,0,0,.4);
        }
        .game-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .game-card h3 { font-size: .9rem; font-weight: 600; margin-bottom: 4px; }
        .game-card span { font-size: .75rem; color: #64748b; }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            font-size: 1.1rem;
            display: none;
        }
    </style>
</head>

        const icons = {
            "Puzzle": "🧩", "Sports": "⚽", "Adventure": "🗺️", "Strategy": "♟️",
            "Action": "⚔️", "Social": "👥", "Classic": "👾", "Horror": "👻",
            "Arcade": "🕹️", "Simulation": "💻", "Platformer": "🏃", "Idle": "⏳",
            "Racing": "🏎️", "Music": "🎵", "Creative": "🎨", "Multiplayer": "🌐",
            "FPS": "🔫", "Sandbox": "⛏️"
        };

        const grid = document.getElementById('gameGrid');
        const search = document.getElementById('search');
        const noResults = document.getElementById('noResults');

        function renderGames(filter = '') {
            const filtered = games.filter(g => 
                g.name.toLowerCase().includes(filter.toLowerCase()) ||
                g.category.toLowerCase().includes(filter.toLowerCase())
            );
            
            grid.innerHTML = '';
            noResults.style.display = filtered.length === 0 ? 'block' : 'none';
            
            filtered.sort((a, b) => a.name.localeCompare(b.name)).forEach(game => {
                const card = document.createElement('a');
                card.className = 'game-card';
                card.href = './' + game.folder + '/';
                card.innerHTML = `
                    <div class="game-icon">${icons[game.category] || '🎮'}</div>
                    <h3>${game.name}</h3>
                    <span>${game.category}</span>
                `;
                grid.appendChild(card);
            });
        }

        search.addEventListener('input', (e) => renderGames(e.target.value));
        renderGames();
    </script>
